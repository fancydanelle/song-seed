<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Song Seed</title>
</head>

<body style="font-family: Arial; text-align: center; padding: 40px;">

  <h1>🎤 Song Seed</h1>
  <p>Capture or upload your idea</p>

  <!-- Record directly -->
  <button id="recordBtn">🎙️ Record</button><br><br>

  <!-- Upload file -->
  <input type="file" id="audioUpload" accept="audio/*"><br><br>

  <audio id="player" controls style="display:none;"></audio>

  <script>
    const recordBtn = document.getElementById("recordBtn");
    const player = document.getElementById("player");

    let mediaRecorder;
    let audioChunks = [];

    // RECORD FEATURE
    recordBtn.onclick = async () => {
      if (!mediaRecorder || mediaRecorder.state === "inactive") {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);

        mediaRecorder.start();
        recordBtn.innerText = "⏹ Stop Recording";

        mediaRecorder.ondataavailable = e => {
          audioChunks.push(e.data);
        };

        mediaRecorder.onstop = () => {
          const blob = new Blob(audioChunks, { type: "audio/webm" });
          const url = URL.createObjectURL(blob);
          player.src = url;
          player.style.display = "block";
          audioChunks = [];
        };

      } else {
        mediaRecorder.stop();
        recordBtn.innerText = "🎙️ Record";
      }
    };

    // FILE UPLOAD
    const upload = document.getElementById("audioUpload");

    upload.addEventListener("change", function() {
      const file = this.files[0];
      if (file) {
        const url = URL.createObjectURL(file);
        player.src = url;
        player.style.display = "block";
      }
    });
  </script>

</body>
</html>
