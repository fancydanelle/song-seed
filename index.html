<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Song Seed</title>
</head>

<body style="font-family: Arial; text-align: center; padding: 40px;">

  <h1>🎤 Song Seed</h1>
  <p>Tap to record your idea</p>

  <!-- Hidden file input -->
  <input 
    type="file" 
    id="audioUpload" 
    accept="audio/*"
    style="display:none;"
  >

  <!-- Visible button -->
  <button id="recordBtn" style="font-size:20px; padding:15px;">
    🎙️ Record
  </button>

  <br><br>

  <audio id="player" controls style="display:none;"></audio>

  <script>
    const upload = document.getElementById("audioUpload");
    const player = document.getElementById("player");
    const recordBtn = document.getElementById("recordBtn");

    // When button is tapped → open iPhone recorder
    recordBtn.onclick = () => {
      upload.click();
    };

    // When audio is selected/recorded
    upload.addEventListener("change", function() {
      const file = this.files[0];

      if (file) {
        const url = URL.createObjectURL(file);
        player.src = url;
        player.style.display = "block";
      }
    });
  </script>

</body>
</html>
